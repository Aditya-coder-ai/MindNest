<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a4a4;stop-opacity:0.15"/>
      <stop offset="40%" style="stop-color:#7b5ea7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4db8a4;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c87da0"/>
      <stop offset="50%" style="stop-color:#7b5ea7"/>
      <stop offset="100%" style="stop-color:#4db8a4"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4db8a4"/>
      <stop offset="100%" style="stop-color:#6dd0bc"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a4a4"/>
      <stop offset="100%" style="stop-color:#c87da0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Arc -->
  <path d="M20 38 A18 18 0 0 1 44 38" fill="none" stroke="url(#arc)" stroke-width="2" stroke-linecap="round"/>
  <!-- Brain shape -->
  <path d="M28 28 Q24 24 26 20 Q28 16 32 18 Q36 16 38 20 Q40 24 36 28 L34 30 Q32 32 30 30 Z" fill="url(#brain)" opacity="0.85"/>
  <!-- Central stem -->
  <line x1="32" y1="30" x2="32" y2="40" stroke="url(#brain)" stroke-width="2" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M32 35 Q26 32 25 28" fill="none" stroke="url(#leaf)" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="25" cy="28" rx="3" ry="1.5" transform="rotate(-30 25 28)" fill="url(#leaf)" opacity="0.7"/>
  <!-- Right leaf -->
  <path d="M32 33 Q38 30 40 26" fill="none" stroke="url(#leaf)" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="40" cy="26" rx="3" ry="1.5" transform="rotate(30 40 26)" fill="url(#leaf)" opacity="0.7"/>
  <!-- Nest strands -->
  <path d="M24 40 Q28 44 32 42 Q36 44 40 40" fill="none" stroke="url(#brain)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M22 42 Q28 47 32 44 Q36 47 42 42" fill="none" stroke="url(#brain)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Sparkles -->
  <circle cx="22" cy="24" r="1" fill="#c87da0" opacity="0.6"/>
  <circle cx="42" cy="22" r="0.8" fill="#4db8a4" opacity="0.5"/>
  <circle cx="18" cy="32" r="0.6" fill="#7b5ea7" opacity="0.4"/>
  <circle cx="46" cy="34" r="0.7" fill="#6dd0bc" opacity="0.5"/>
</svg>